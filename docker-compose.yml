services:
  web:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      STATIC_ROOT: /app/static
      GALAXY_SNAPSHOT_DIR: /app/data/galaxy-snapshots
    env_file:
      - path: .env
    volumes:
      - galaxy_snapshots:/app/data/galaxy-snapshots

volumes:
  galaxy_snapshots:
