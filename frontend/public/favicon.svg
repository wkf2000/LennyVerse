  <!-- Edges -->
  <g stroke="#c7d2fe" stroke-opacity="0.25" stroke-width="0.7">
    <line x1="8" y1="7" x2="16" y2="11"/>
    <line x1="24" y1="7" x2="16" y2="11"/>
    <line x1="16" y1="11" x2="9" y2="17"/>
    <line x1="16" y1="11" x2="23" y2="16"/>
  </g>
  <!-- LV text -->
  <text x="16" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="12" fill="white">LV</text>
