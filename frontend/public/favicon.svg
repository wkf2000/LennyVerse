      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Simplified graph dots -->
  <circle cx="8" cy="7" r="1.5" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="24" cy="7" r="1.5" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="16" cy="11" r="2" fill="#c7d2fe" opacity="0.7"/>
  <circle cx="9" cy="17" r="1.5" fill="#c7d2fe" opacity="0.5"/>
