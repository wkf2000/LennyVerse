<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="node-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Graph constellation edges (behind nodes) -->
  <g stroke="#a5b4fc" stroke-opacity="0.35" stroke-width="2">
    <line x1="128" y1="120" x2="256" y2="180"/>
    <line x1="256" y1="180" x2="384" y2="110"/>
    <line x1="256" y1="180" x2="160" y2="280"/>
    <line x1="256" y1="180" x2="352" y2="260"/>
    <line x1="160" y1="280" x2="352" y2="260"/>
    <line x1="160" y1="280" x2="128" y2="400"/>
    <line x1="352" y1="260" x2="400" y2="380"/>
    <line x1="128" y1="400" x2="256" y2="420"/>
    <line x1="256" y1="420" x2="400" y2="380"/>
  </g>

  <!-- Graph constellation nodes -->
  <g fill="url(#node-glow)">
    <circle cx="128" cy="120" r="10"/>
    <circle cx="384" cy="110" r="8"/>
    <circle cx="256" cy="180" r="12"/>
    <circle cx="160" cy="280" r="9"/>
    <circle cx="352" cy="260" r="10"/>
    <circle cx="128" cy="400" r="8"/>
    <circle cx="400" cy="380" r="9"/>
    <circle cx="256" cy="420" r="7"/>
  </g>

  <!-- LV lettermark -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="180" fill="white" letter-spacing="-8">LV</text>
</svg>
